<!DOCTYPE html>
<html lang="es">
<head>

    <title>Programas en Educación en Tecnología</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f5f7fb;

        header {
            padding: 30px;
            background: white;
            border-bottom: 1px solid #e5e7eb;

            display: flex;
            justify-content: center;

            padding: 60px 20px;

            border-radius: 15px;
            padding: 30px;
            width: 320px;
            transition: all 0.3s ease;
            cursor: pointer;
            border: 1px solid #e5e7eb;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
        }

        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            border-color: #3b82f6;
        }

        .card img {
            width: 100%;
            max-height: 200px;
            object-fit: contain;
        }

        .card h2 {
            margin-top: 20px;
            font-weight: 500;
            color: #111827;
        }

        footer {
            margin-top: 40px;

        }

</head>
